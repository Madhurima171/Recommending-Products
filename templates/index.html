<!DOCTYPE html>
<html>
<head>
    <title>Smart Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="overlay">
        <div class="container hero-content">
            <div class="row align-items-center">
                <div class="col-lg-7 hero-text">
                    <h1>Next-Gen <br>Smart Recommender</h1>
                    <p class="text-white opacity-75 fs-5">AI-driven selection tailored for you.</p>
                </div>
                <div class="col-lg-5">
                    <div class="glass-box">
                        <h3 class="text-center mb-4 fw-bold">Quick Recommendation</h3>
                        <form action="/recommend" method="POST">
                            <label class="small fw-bold mb-2">SELECT A PRODUCT TO START</label>
                            <select name="product" class="form-select mb-4 py-3 shadow-none" required>
                                <option value="">Choose product...</option>
                                {% for p in products %}
                                <option value="{{ p.id }}">{{ p.name }}</option>
                                {% endfor %}
                            </select>
                            <button class="recommend-btn-home py-3 fs-5">Analyze & Recommend</button>
                        </form>
                        <div class="mt-4 text-center">
                            <p class="small opacity-75 mb-3">Or access account</p>
                            <div class="d-flex gap-3">
                                <a href="/login" class="btn btn-outline-light w-50 py-2">Login</a>
                                <a href="/register" class="btn btn-light w-50 py-2 fw-bold">Register</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
