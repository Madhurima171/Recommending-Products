<!DOCTYPE html>
<html>
<head>
    <title>AI Recommendations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="overlay">
        <div class="container py-5">
            <div class="bg-white p-5 rounded-4 shadow">
                <h3>Recommendations for: <span class="text-primary">{{ product }}</span></h3>
                <div class="row mt-4">
                    {% if recommendations %}
                        {% for item in recommendations %}
                        <div class="col-md-3">
                            <div class="card border-0 shadow-sm text-center">
                                <img src="/static/product_images/{{ item.image }}" class="card-img-top rounded-3" style="height:180px; object-fit:cover;">
                                <div class="card-body">
                                    <h6>{{ item.name }}</h6>
                                    <small class="text-muted d-block">{{ item.category }}</small>
                                    <p class="text-success fw-bold mt-2">Match Score: {{ item.score }}%</p>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    {% else %}
                        <p>No similar products found.</p>
                    {% endif %}
                </div>

                <hr class="my-5">
                <h4>Add Review</h4>
                <form method="POST" action="/add_review" class="col-md-6">
                    <input type="hidden" name="product_id" value="{{ recommendations[0].id if recommendations }}">
                    <select name="rating" class="form-select mb-3">
                        <option value="5">5 Star</option>
                        <option value="4">4 Star</option>
                        <option value="3">3 Star</option>
                        <option value="2">2 Star</option>
                        <option value="1">1 Star</option>
                    </select>
                    <textarea name="review" class="form-control mb-3" placeholder="Write review..." rows="3"></textarea>
                    <button class="btn btn-primary px-4">Submit Review</button>
                </form>

                <a href="/dashboard" class="btn btn-dark mt-4">Go Back</a>
            </div>
        </div>
    </div>
</body>
</html>
