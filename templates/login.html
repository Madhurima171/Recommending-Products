<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-card shadow-lg">
        <h2>Get Started</h2>
        <form method="POST">
            <div class="text-start mb-3">
                <label><i class="bi bi-person-circle"></i> Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="text-start mb-4">
                <label><i class="bi bi-lock-fill"></i> Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-login-main">Login</button>
            <div class="mt-4">
                <a href="/register" class="text-white small text-decoration-none">New User Register</a>
            </div>
        </form>
    </div>
</body>
</html>
