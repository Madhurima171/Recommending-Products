<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="overlay">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 py-3 sticky-top">
            <a class="navbar-brand fw-bold fs-3" href="/">RecSystem<span class="text-primary">.</span></a>
            <div class="ms-auto"><a href="/logout" class="btn btn-danger px-4 fw-bold">Logout</a></div>
        </nav>

        <div class="container pb-5">
            <h1 class="dashboard-title">Explore Our Collection</h1>

            <form method="GET" action="/dashboard" class="mb-5">
                <div class="row">
                    <div class="col-md-10">
                        <input type="text" name="search" class="form-control py-3 rounded-4 shadow-none" placeholder="Search products...">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100 py-3 rounded-4 fw-bold">Search</button>
                    </div>
                </div>
            </form>

            <div class="filter-pills">
                <a href="/dashboard" class="pill-btn {{ 'active' if not request.args.get('category') }}">All Products</a>
                {% for cat in categories %}
                <a href="/dashboard?category={{ cat.category }}" 
                   class="pill-btn {{ 'active' if request.args.get('category') == cat.category }}">
                    {{ cat.category }}
                </a>
                {% endfor %}
            </div>

            <div class="row g-4">
                {% for p in products %}
                <div class="col-md-3">
                    <div class="card product-card text-center">
                        <img src="{{ url_for('static', filename='product_images/' + p.image) }}">
                        <div class="card-body">
                            <p class="text-muted small mb-1">{{ p.category }}</p>
                            <h5 class="fw-bold mb-4">{{ p.name }}</h5>
                            <form action="/recommend" method="POST">
                                <input type="hidden" name="product" value="{{ p.id }}">
                                <button class="find-related-btn">Find Related</button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <h2 class="text-white mt-5 mb-4">Trending Products 🔥</h2>
        </div>
    </div>
</body>
</html>
