<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="reg-body">
    <div class="reg-container">
        <div class="reg-side-img">
            <img src="{{ url_for('static', filename='product_images/reg_side.jpg') }}">
        </div>
        <div class="reg-form-box">
            <h2>REGISTER HERE</h2>
            <form method="POST">
                <div class="reg-grid">
                    <div><label>First Name</label><input type="text" name="first_name" class="form-control" required></div>
                    <div><label>Last Name</label><input type="text" name="last_name" class="form-control" required></div>
                    <div><label>Contact No</label><input type="text" name="phone" class="form-control" required></div>
                    <div><label>Email</label><input type="email" name="email" class="form-control" required></div>
                    <div>
                        <label>Security Question</label>
                        <select name="security_question" class="form-select">
                            <option>What is your pet name?</option>
                            <option>Your birthplace?</option>
                            <option>Your favorite color?</option>
                        </select>
                    </div>
                    <div><label>Security Answer</label><input type="text" name="security_answer" class="form-control" required></div>
                    <div><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <div><label>Confirm Password</label><input type="password" name="confirm_password" class="form-control" required></div>
                </div>
                <div class="mt-4 small d-flex align-items-center">
                    <input type="checkbox" required class="me-2"> I Agree The Terms & Conditions
                </div>
                <div class="mt-4 d-flex justify-content-between align-items-center">
                    <button type="submit" class="btn-reg-pink shadow-sm">REGISTER NOW</button>
                    <a href="/login" class="btn-log-blue shadow-sm">Log in</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
